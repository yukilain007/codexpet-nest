name: Phase 0 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- TypeScript: typecheck + lint + format + test ---
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Test (React/Vitest)
        run: pnpm test

  # --- Rust: format + clippy + test on all platforms ---
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Rust format check
        run: cargo fmt --all --check
        working-directory: apps/desktop-tauri/src-tauri
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktop-tauri/src-tauri
      - name: Rust tests
        run: cargo test
        working-directory: apps/desktop-tauri/src-tauri

  # --- Tauri build smoke test (macOS only for CI speed) ---
  build-smoke:
    runs-on: macos-latest
    needs: [typescript, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Tauri build (smoke test)
        run: pnpm tauri build --bundles app
        working-directory: apps/desktop-tauri
